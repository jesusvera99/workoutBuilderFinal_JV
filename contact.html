<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workout Builder | Contact</title>
  <meta name="description" content="Contact page for the Workout Builder running plan generator project.">
  <meta name="author" content="Jesus Vera">

  <link rel="stylesheet" href="css/normalize.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/vendor-modernizr-custom.js"></script>
</head>

<body>
  <header class="site-header" role="banner">
    <h1 class="site-header__title">Workout Builder</h1>
    <nav class="nav" aria-label="Main navigation">
      <a class="nav__link" href="index.html">Home</a>
      <a class="nav__link" href="about.html">About</a>
      <a class="nav__link nav__link--active" href="contact.html" aria-current="page">Contact</a>
    </nav>
  </header>

  <main class="page" id="main-content" role="main">
    <section class="page-intro" aria-labelledby="contact-title">
      <h2 class="page-intro__title" id="contact-title">Contact Us</h2>
      <p class="page-intro__text">Want release updates or have a question about building your weekly plan? Tap in below.
      </p>
    </section>

    <section class="form-section" aria-label="Contact form section">
      <form class="contact-form" aria-label="Contact form">
        <label class="contact-form__label" for="name">Name</label>
        <input class="contact-form__input" type="text" id="name" name="name" autocomplete="name">

        <label class="contact-form__label" for="email">Email</label>
        <input class="contact-form__input" type="email" id="email" name="email" autocomplete="email">

        <label class="contact-form__label" for="message">Message</label>
        <textarea class="contact-form__input" id="message" name="message" rows="5"></textarea>

        <button class="btn contact-form__button" type="button">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p class="site-footer__text">&copy;2026 Jesus Vera | Workout Builder</p>
  </footer>
</body>

</html>
